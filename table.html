<html>
    <head>
        <title>Table form</title>
    </head>
    <body>
        
        <div class="simple-item-list">
            <h1>Simple Table</h1>

            <table border="2" align="left corner">
                <thead style="color:blue">
                    <tr>
                        <th colspan="4">Welcome to flipcart</th>
                    </tr>
                    <tr>
                        <th>Sno</th>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>bat</td>
                        <td>1</td>
                        <td>2000</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td rowspan="2">ball</td>
                        <td>1 peice</td>
                        <td>100</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <!-- <td>bat</td> -->
                        <td>10peice</td>
                        <td>900</td>
                    </tr>
                </tbody>
                <tfoot style="color:violet">
                    <tr>
                        <th colspan="3">CGST</th>
                        <td>20</td>
                        
                    </tr>
                    <tr>
                        <th colspan="3">SGST</th>
                         <td>20</td>
                        
                    </tr>
                    <tr>
                        <th colspan="3">Total</th>
                        <th>3000</th>
                    </tr>
                </tfoot>
               
            </table>

        </div>

    </body>
</html>
