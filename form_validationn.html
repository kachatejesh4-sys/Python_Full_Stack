<html>

<head>
    <title> Example Form </title>
</head>

<body>
    <center>
        <h3> Registration Form</h3>
    </center>



    <form>

        <div class="row">
            <label for="student-name">
                <span>student Name</span> 
                <span style="color:blue">*</span>
            </label>

            <input 
                type="text" id="student-name" name="student-name" 
                value=""
                placeholder="name"
                required
                 />
        </div> &nbsp;&nbsp;&nbsp;


        <div class="row">
            <label>
                <span>Email</span>
                <span style="color:blue">*</span>
            </label>
            <input 
                type="email" 
                id="student-email" 
                name="student-email"
                placeholder="@gmail.com"
                required />
        </div> &nbsp;&nbsp;&nbsp;

        <div class="row">
            <label>
                <span>Mobile Number</span>
                <span style="color:blue">*</span>
            </label>
            <input 
                type="tel"
                id="student-number"
                name="student-number"
                pattern="[0-9]{6,10}"
                minlength="6"
                maxlength="10"
                placeholder="00000 00000"
                required
            >
        </div> &nbsp;&nbsp;&nbsp;

        <div class="row">
            <label>
                <span>Date of Birth</span>
                <span style="color:blue">*</span>
            </label>
            <input 
                type="date" 
                id="student-dob" 
                name="student-dob"
                 required 
                 />
        </div> &nbsp;&nbsp;&nbsp;





        <div class="row">
            <label>
                <span>Password</span>
                <span style="color:blue">*</span>
            </label>
            <input 
                type="password" 
                id="student-password" 
                name="student-password" 
                placeholder="******"
                required 
            />
        </div> &nbsp;&nbsp;&nbsp;


        <div class="row">
            <label for="malegender">
                <span>Gender</span>
                <span style="color:blue">*</span>
            </label>
            <input type="radio" id="gender" name="gender" value="male" required /> male

            <input type="radio" id="gender"  name="gender" value="female" required /> female
        </div> &nbsp;&nbsp;&nbsp;



        <div class="row">
            <label>
                 <span>Languages</span>
                <span style="color:blue">*</span>
            </label>
            <input type="checkbox" id="lang" name="lang[]" value="tamil" required />Tamil

            <input type="checkbox" id="lang" name="lang[]" value="english" required />English

            <input type="checkbox" id="lang" name="lang[]" value="telugu"  />Malaylam
        </div> &nbsp;&nbsp;&nbsp;



        <div class="row">
            <label> Comments </label>
            <textarea 
                rows="10" 
                cols="10"
                placeholder="comments..."
            ></textarea>
        </div> &nbsp;&nbsp;&nbsp;





        <div class="row">
            <label> Country </label>
            <select name="country" required >
                <option value="">choose your country</option>
                <option value="IN">India</option>
                <option value="CN">China</option>
                <option value="PK">Europe</option>
                <option value="PK">Asturalia</option>
 
            </select>
        </div>







        &nbsp;&nbsp;&nbsp;

        <div class="row">
            <input type="submit" value="Register" />
            <input type="button" value="cancel" />
            <button>Reset</button>
        </div>

    </form>
</body>
    
</html>
