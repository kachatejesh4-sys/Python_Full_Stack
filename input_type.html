<html>
<head>
    
    <title>Input Types</title>
   
</head>
<body>
        <div>
            <label for="">Text</label>
             <input 
                type="text"
                name="sample-text"
                id=""
                value =""
                placeholder="name"
            />
        </div>

        <div>
            <label for="">password</label>
            <input 
                type="password"
                name="sample-text"
                id=""
                value =""
            />
        </div>

        <div>
            <label for="">Email</label>
            <input 
                type="email"
                name="sample-text"
                id=""
                value =""
                placeholder="@gmail.com"
            />
        </div>

        <div>
            <label for="">dob</label>
            <input 
                type="date"
                name="sample-text"
                id=""
                value =""
                max="2026-03-12"
               
            />
        </div>


         <div>
            <label for="">date with time</label>
            <input 
                type="datetime-local"
                name="sample-text"
                id=""
                value =""
                max="2026-03-12 11.25"
            />
        </div>


        <div>
            <label for="">Number</label>
            <input 
                type="number"
                name="sample-text"
                id=""
                placeholder="0000000000"
            />
        </div>
        

         <div>
            <label for="">Tel</label>
            <input 
                type="tel"
                name="sample-text"
                id=""
                pattern="[0-9]{10}"
                placeholder="0000000000"
            />
        </div>

         <div>
            <label for="">check box</label>
            <input 
                type="checkbox"
                name="sample-text"
                id=""
                value="english"
            /> english
        </div>

        <div>
            <label for="">check box auto checked</label>
            <input 
                type="checkbox"
                name="sample-text"
                id=""
                value="english"
                checked
            /> english
        </div>
       
        <div>
            

         <div>
            <label for="">file</label>
            <input 
                type="file"
                name="sample-text"
              
            /> 
        </div>


        <div>
            <input type="submit" />
            <button>cancel</button>

        </div>

        <div class="rich-text-box">
            <textarea name="address" id="address" rows="15" cols="30"></textarea>
        </div>

        <div class="select-box">
            <select name="fruits" id="subjects">
                <option value="">tamil</option>
                <option value="apple">english</option>
                <option value="orange">science</option>
            </select>
        </div>
       
</body>
</html>
